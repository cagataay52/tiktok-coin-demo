<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Ağı - Gönderi Şablonu</title>
    <style>
        /* Genel Sıfırlama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #333333; /* Sayfa arka planı */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Ana Şablon Konteyneri (1080x1080 Post Oranı) */
        .skor-agi-sablon {
            width: 100%;
            max-width: 600px; /* Ekranda rahat görmek için 600px, post için ideal orantı */
            aspect-ratio: 1 / 1; /* Kare format zorlaması */
            background-color: #000000;
            border: 2px solid #ff6600;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Üst Bilgi */
        .sa-header {
            background-color: #000000;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #111111;
        }

        .sa-logo {
            color: #ff6600;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* Son Dakika Bandı */
        .son-dakika-bandi {
            display: flex;
            background-color: #111111;
            border-bottom: 2px solid #ff6600;
            align-items: center;
        }

        .sd-baslik {
            background-color: #ff6600;
            color: #000000;
            font-weight: 900;
            padding: 12px 20px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .sd-icerik {
            padding: 0 15px;
            width: 100%;
            overflow: hidden;
        }

        #dinamik-haber-metni {
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            transition: opacity 0.5s ease-in-out;
        }

        /* Manşet / Ana Görsel Alanı */
        .manset-alani {
            background-color: #1a1a1a;
            flex-grow: 1; /* Kareyi doldurması için kalan boşluğu kaplar */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .manset-baslik {
            color: #ffffff;
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .manset-altbaslik {
            color: #ff6600;
            font-size: 20px;
            font-weight: bold;
        }

        /* İstatistik Alanı (Kesişmeyi Önleyen Grid) */
        .istatistik-alani {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 eşit sütun */
            gap: 10px;
            background-color: #000000;
            padding: 20px;
        }

        .istatistik-kutu {
            background-color: #111111;
            border-top: 4px solid #ff6600;
            padding: 15px 5px;
            text-align: center;
        }

        .istatistik-kutu .deger {
            color: #ffffff;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .istatistik-kutu .etiket {
            color: #ff6600;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Alt Bilgi */
        .sa-footer {
            background-color: #ff6600;
            color: #000000;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="skor-agi-sablon">
        
        <header class="sa-header">
            <div class="sa-logo">SKOR AĞI</div>
        </header>

        <div class="son-dakika-bandi">
            <div class="sd-baslik">SON DAKİKA</div>
            <div class="sd-icerik">
                <p id="dinamik-haber-metni">Haberler yükleniyor...</p>
            </div>
        </div>

        <div class="manset-alani">
            <h1 class="manset-baslik">DEV MAÇTA SESSİZLİK</h1>
            <p class="manset-altbaslik">Kritik 90 dakikada gol sesi çıkmadı, puanlar paylaşıldı.</p>
        </div>

        <div class="istatistik-alani">
            <div class="istatistik-kutu">
                <div class="deger">%61</div>
                <div class="etiket">Topla Oyn.</div>
            </div>
            <div class="istatistik-kutu">
                <div class="deger">14</div>
                <div class="etiket">Top. Şut</div>
            </div>
            <div class="istatistik-kutu">
                <div class="deger">5</div>
                <div class="etiket">İsab. Şut</div>
            </div>
            <div class="istatistik-kutu">
                <div class="deger">3</div>
                <div class="etiket">Sarı Kart</div>
            </div>
        </div>

        <footer class="sa-footer">
            <span>@SKORAGI</span>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const haberler = [
                "Fenerbahçe Yönetiminden Sert Açıklama!",
                "Galatasaray'a CAS'tan Kötü Haber: Başvuru Reddedildi.",
                "Süper Lig'de zirve yarışı alev alev."
            ];

            let haberIndex = 0;
            const haberMetniElementi = document.getElementById('dinamik-haber-metni');

            // İlk haberi yazdır
            haberMetniElementi.textContent = haberler[haberIndex];

            // 4 saniyede bir değiştir
            setInterval(() => {
                haberMetniElementi.style.opacity = 0; // Karart
                
                setTimeout(() => {
                    haberIndex = (haberIndex + 1) % haberler.length;
                    haberMetniElementi.textContent = haberler[haberIndex];
                    haberMetniElementi.style.opacity = 1; // Tekrar görünür yap
                }, 500); 

            }, 4000); 
        });
    </script>
</body>
</html>
