<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Ağı - Şablon Üretici</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="match-card" id="capture-area">
        <div class="header">
            <span class="league">TÜRKİYE SÜPER LİG</span>
            <span class="brand">SKOR<span class="highlight">/AĞI</span></span>
        </div>
        
        <div class="scoreboard">
            <div class="team">
                <div class="logo-placeholder" id="home-logo">GS</div>
                <h2 id="home-name">GALATASARAY</h2>
            </div>
            
            <div class="score-container">
                <span class="time">MAÇ SONUCU</span>
                <div class="score">
                    <span id="home-score">2</span>
                    <span class="divider">-</span>
                    <span id="away-score">1</span>
                </div>
            </div>
            
            <div class="team">
                <div class="logo-placeholder" id="away-logo">FB</div>
                <h2 id="away-name">FENERBAHÇE</h2>
            </div>
        </div>

        <div class="footer">
            <p>@skoragi_tr</p>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button id="downloadBtn" style="padding: 15px 30px; background-color: #FF5722; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold;">
            📸 Şablonu PNG Olarak İndir
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>


</body>
</html>
