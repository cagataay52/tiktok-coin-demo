<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipper</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode"> 

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h1 class="logo" style="font-size: 36px; margin-bottom: 20px; text-align: center;">Swipper</h1>
            <p style="text-align: center; margin-bottom: 20px; color: var(--secondary-text);">Dünyaya bağlan</p>
            
            <input type="email" id="auth-email" class="custom-input" placeholder="E-posta" style="margin-bottom: 10px;">
            <input type="password" id="auth-password" class="custom-input" placeholder="Şifre" style="margin-bottom: 15px;">
            
            <button id="login-btn" class="primary-btn" style="width: 100%; margin-bottom: 10px;">Giriş Yap</button>
            <button id="register-btn" class="edit-profile-btn" style="width: 100%; margin: 0;">Yeni Hesap Oluştur</button>
            
            <p id="auth-error" style="color: #ed4956; text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; display: none;"></p>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header class="top-header">
            <button id="add-post-trigger" class="icon-btn"><i class="fa-solid fa-square-plus"></i></button>
            <h1 class="logo">Swipper</h1>
            <button class="icon-btn"><i class="fa-regular fa-heart"></i></button>
        </header>

        <main id="main-content">
            <section id="home-tab" class="tab-content active">
                <div class="stories-container" id="stories-wrapper">
                    <div class="story create-story">
                        <div class="story-ring"><img src="https://i.pravatar.cc/150?img=11" id="my-story-img" alt="Sen"></div>
                        <span class="plus-icon">+</span>
                        <span>Sen</span>
                    </div>
                </div>
                <div id="feed-container"></div>
            </section>

            <section id="explore-tab" class="tab-content">
                <div class="search-header">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Ara...">
                    </div>
                </div>
                <div id="search-results" class="user-list"></div>
            </section>

            <section id="dm-tab" class="tab-content">
                <div id="chat-list-view">
                    <h3 style="padding: 16px; border-bottom: 1px solid var(--border-color);">Mesajlar</h3>
                    <div id="dm-list" class="user-list"></div>
                </div>
            </section>

            <section id="reels-tab" class="tab-content"><h2 class="placeholder-text">Reels Çok Yakında</h2></section>

            <section id="profile-tab" class="tab-content">
                <div class="profile-top-bar">
                    <span class="profile-username" id="display-username">Yükleniyor...</span>
                    <button id="settings-btn" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
                </div>
                <div class="profile-header">
                    <div class="avatar-container" id="avatar-container">
                        <img src="https://i.pravatar.cc/150?img=11" class="profile-avatar" id="main-profile-pic">
                        <div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat"><strong id="post-count">0</strong><span>Gönderi</span></div>
                        <div class="stat"><strong>0</strong><span>Takipçi</span></div>
                        <div class="stat"><strong>0</strong><span>Takip</span></div>
                    </div>
                </div>
                <div class="profile-bio">
                    <strong class="profile-display-name" id="display-name">Kullanıcı Adı Yükleniyor...</strong>
                    <p id="display-bio">Swipper'a Hoş Geldin!</p>
                    <button id="logout-btn" class="edit-profile-btn" style="color: #ed4956; border-color: #ed4956;">Çıkış Yap</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-target="home-tab"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-item" data-target="explore-tab"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="#" class="nav-item" data-target="dm-tab"><i class="fa-brands fa-facebook-messenger"></i></a>
            <a href="#" class="nav-item" data-target="reels-tab"><i class="fa-solid fa-clapperboard"></i></a>
            <a href="#" class="nav-item" data-target="profile-tab"><img src="https://i.pravatar.cc/150?img=11" class="nav-profile-pic" id="nav-profile-img"></a>
        </nav>
    </div>

    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Gönderi</h3>
                <button class="close-btn" id="close-post"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <textarea id="post-content-input" class="custom-textarea" placeholder="Neler düşünüyorsun?"></textarea>
            <button id="save-post-btn" class="primary-btn">Paylaş</button>
        </div>
    </div>

    <input type="file" id="profile-upload" accept="image/*" style="display: none;">

    <script src="app.js"></script>
</body>
</html>
