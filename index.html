<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipper</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode"> 

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h1 class="insta-logo" style="font-size: 44px; margin-bottom: 30px; text-align: center;">Swipper</h1>
            <input type="email" id="auth-email" class="custom-input" placeholder="E-posta">
            <input type="password" id="auth-password" class="custom-input" placeholder="Şifre" style="margin-bottom: 20px;">
            <button id="login-btn" class="primary-btn" style="width: 100%;">Giriş Yap</button>
            <div class="divider"><span>veya</span></div>
            <button id="register-btn" class="secondary-btn" style="width: 100%;">Yeni Hesap Oluştur</button>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        
        <header class="top-header">
            <h1 class="insta-logo">Swipper</h1>
            <div class="header-icons">
                <button class="icon-btn" id="theme-toggle-btn"><i class="fa-regular fa-moon"></i></button>
            </div>
        </header>

        <main id="main-content">
            
            <section id="home-tab" class="tab-content active">
                <div class="stories-container" id="stories-wrapper">
                    <div class="story create-story" id="add-story-btn">
                        <div class="story-ring"><img src="https://i.pravatar.cc/150?img=11" id="my-story-img" alt="Sen"></div>
                        <span class="plus-icon"><i class="fa-solid fa-plus"></i></span>
                        <span>Hikayen</span>
                    </div>
                </div>
                <div id="feed-container"></div>
            </section>

            <section id="explore-tab" class="tab-content">
                <div class="search-bar-container">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Gerçek kullanıcıları ara...">
                    </div>
                </div>
                <div id="search-results" class="user-list"></div>
            </section>

            <section id="dm-tab" class="tab-content">
                <div id="dm-list-container">
                    <div class="dm-header">
                        <h3>Mesajlar</h3>
                    </div>
                    <div id="dm-list" class="user-list"></div>
                </div>
                
                <div id="dm-chat-container" style="display: none;">
                    <div class="chat-header">
                        <button id="back-to-dm-list" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></button>
                        <img id="chat-user-avatar" src="" class="post-avatar" style="margin-left: 10px;">
                        <span id="chat-user-username" class="post-author"></span>
                    </div>
                    <div id="chat-messages" class="chat-messages-box"></div>
                    <div class="chat-input-container">
                        <input type="text" id="chat-message-input" placeholder="Mesaj yaz...">
                        <button id="send-message-btn" class="icon-btn"><i class="fa-solid fa-paper-plane" style="color: var(--blue);"></i></button>
                    </div>
                </div>
            </section>

            <section id="profile-tab" class="tab-content">
                <div class="profile-top-bar">
                    <span class="profile-username" id="display-username">@yukleniyor</span>
                    <div style="display: flex; gap: 15px;">
                        <button class="icon-btn" id="logout-btn"><i class="fa-solid fa-right-from-bracket" style="color: #ed4956;"></i></button>
                    </div>
                </div>
                
                <div class="profile-header">
                    <div class="avatar-container" id="avatar-container">
                        <img src="https://i.pravatar.cc/150?img=11" class="profile-avatar" id="main-profile-pic">
                        <div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat"><strong id="post-count">0</strong><span>Gönderi</span></div>
                        <div class="stat"><strong>0</strong><span>Takipçi</span></div>
                        <div class="stat"><strong>0</strong><span>Takip</span></div>
                    </div>
                </div>
                
                <div class="profile-bio-section">
                    <strong class="profile-name" id="display-name">Yükleniyor...</strong>
                    <p class="profile-bio-text" id="display-bio">Biyografi yükleniyor...</p>
                </div>
                
                <div class="profile-actions">
                    <button class="edit-profile-btn" id="edit-profile-trigger">Profili Düzenle</button>
                </div>

                <div class="profile-tabs">
                    <div class="p-tab active"><i class="fa-solid fa-table-cells"></i></div>
                </div>
                <div class="profile-grid" id="profile-grid-container"></div>
            </section>

        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-target="home-tab"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-item" data-target="explore-tab"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="#" class="nav-item" id="nav-add-btn"><i class="fa-regular fa-square-plus" style="font-size: 26px;"></i></a>
            <a href="#" class="nav-item" data-target="dm-tab"><i class="fa-brands fa-facebook-messenger"></i></a>
            <a href="#" class="nav-item" data-target="profile-tab"><img src="https://i.pravatar.cc/150?img=11" class="nav-profile-pic" id="nav-profile-img"></a>
        </nav>
    </div>

    <div id="edit-profile-modal" class="modal">
        <div class="modal-content bottom-sheet">
            <div class="modal-header">
                <h3>Profili Düzenle</h3>
                <button class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="input-group">
                <label>Ad Soyad</label>
                <input type="text" id="input-name" class="custom-input">
            </div>
            <div class="input-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="input-username" class="custom-input">
            </div>
            <div class="input-group">
                <label>Biyografi</label>
                <textarea id="input-bio" class="custom-textarea" style="height: 60px;"></textarea>
            </div>
            <button id="save-profile-btn" class="primary-btn">Kaydet</button>
        </div>
    </div>

    <div id="create-options-modal" class="modal">
        <div class="modal-content bottom-sheet" style="padding: 10px 0;">
            <div class="modal-drag-handle"></div>
            <div class="create-option" id="btn-create-post">
                <i class="fa-solid fa-table-cells"></i><span>Gönderi Paylaş</span>
            </div>
            <div class="create-option" id="btn-create-story-menu">
                <i class="fa-solid fa-circle-plus"></i><span>Hikaye Paylaş</span>
            </div>
        </div>
    </div>

    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Gönderi</h3>
                <button class="close-btn" id="close-post"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="image-upload-preview" id="post-image-preview" style="display: none;">
                <img id="preview-img" src="" style="width: 100%; border-radius: 8px; max-height: 250px; object-fit: cover;">
            </div>
            <button id="select-post-image" class="secondary-btn" style="margin-bottom: 10px;">Galeriden Fotoğraf Seç</button>
            <textarea id="post-content-input" class="custom-textarea" placeholder="Açıklama yaz..." style="height: 60px;"></textarea>
            <button id="save-post-btn" class="primary-btn">Paylaş</button>
        </div>
    </div>

    <input type="file" id="profile-upload" accept="image/*" style="display: none;">
    <input type="file" id="post-image-upload" accept="image/*" style="display: none;">
    <input type="file" id="story-image-upload" accept="image/*" style="display: none;">

    <script src="app.js"></script>
</body>
</html>
