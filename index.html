<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Ağı - Maç Günü</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="match-card" id="capture-area">
        <div class="bg-overlay"></div>

        <div class="match-info">
            <div class="team">
                <img src="https://media.api-sports.io/football/teams/11.png" alt="Galatasaray" class="logo" id="home-logo">
                <span class="team-name" id="home-name">GALATASARAY</span>
            </div>
            
            <div class="center-details">
                <div class="time" id="match-time">19:00</div>
                <div class="venue" id="match-venue">RAMS Park</div>
            </div>
            
            <div class="team">
                <img src="https://media.api-sports.io/football/teams/9.png" alt="Fenerbahçe" class="logo" id="away-logo">
                <span class="team-name" id="away-name">FENERBAHÇE</span>
            </div>
        </div>

        <div class="bottom-section">
            <div class="score-predictor">
                <span>SCORE PREDICTOR</span> <span class="highlight">2 - 2</span>
            </div>
            <h1 class="main-title">MAÇ GÜNÜ</h1>
            <div class="footer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="social-icon" alt="IG">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/X_logo_2023.svg" class="social-icon x-icon" alt="X">
                <span>@skoragi_tr</span>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button id="downloadBtn" class="download-btn">📸 Şablonu PNG Olarak İndir</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
